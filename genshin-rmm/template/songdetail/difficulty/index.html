<!DOCTYPE html>
<html lang="{[{@langcode-hyphen:str}]}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{{songtitle}}} - {[{pagetitle:html}]}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="/genshin-rmm/common.css" rel="stylesheet">
  <link href="/genshin-rmm/fonts/font.css" rel="stylesheet">
  <link rel="canonical" href="https://md-ndv356.github.io/genshin-rmm/{[{@langcode:str}]}/{{{songid}}}/{{{difficulty-id}}}/">
  {{{alternate-links}}}
  <style>
    #chart {
      position: relative;
      display: inline-block;
      text-align: center;
      width: 415px;
      margin-top: 25px;
    }
    .tap {
      position: absolute;
      width: 26px; height: 26px;
      border-radius: 15px;
      border: solid 2px #ddd;
      background-color: #eabd59;
      z-index: 10;
    }
    .longedge {
      position: absolute;
      width: 26px; height: 26px;
      border-radius: 15px;
      border: solid 2px #ddd;
      background-color: #8f6eff;
      z-index: 10;
    }
    .longmid {
      position: absolute;
      width: 20px;
      background-color: #8f6effb3;
      translate: 5px 15px;
      z-index: 6;
    }
    .barline::before {
      position: absolute;
      right: 0;
      top: -14px;
      display: block;
      text-align: end;
      color: #6ef78f;
      content: attr(data-bpm);
    }
    .barline {
      position: absolute;
      font-family: "Micro 5", serif;
      font-size: 20px;
      translate: 0 4px;
      width: 24px;
      padding-right: 1px;
      text-align: end;
    }
    .barline::after {
      position: absolute;
      top: 0px; left: 25px;
      content: "";
      display: block;
      width: var(--chart-barline-w, 390px); height: 2px;
      background-color: #ffffff80;
      z-index: 2;
      translate: 0 10px;
    }
    .barline.bpmchange::after {
      background-color: #7eff9c80;
    }
    .laneline {
      position: absolute;
      top: 0px; width: 1px;
      background-color: #ffffff80;
      z-index: 1;
    }
    .information {
      margin: 8px 12px 28px;
      padding: 8px;
      border: solid 2px #888;
      border-radius: 2px;
      background-color: #27343a;
    }
    #album {
      font-size: 14px;
      color: #ddd;
    }
    #title {
      font-size: 18px;
      font-weight: bold;
      margin: 4px 0;
    }
    #title {
      font-size: 18px;
      font-weight: bold;
      margin: 4px 0;
    }
    #title a {
      color: #b9ebfa;
      text-decoration: none;
    }
    #title-multi {
      display: flex;
      justify-content: center;
      flex-direction: column;
      border-collapse: collapse;
    }
    #title-multi > div {
      line-height: 1.25;
      margin: 1px 0;
    }
    .titlesublang {
      padding: 0 6px 0 0;
      font-size: 13px;
      color: #ddd;
      text-align: start;
    }
    .titlesub {
      padding: 0 0 0 0;
      font-size: 15px;
      text-align: start;
    }
    .others {
      display: flex;
      justify-content: center;
      gap: 14px;
      font-size: 15px;
      color: #eee;
    }
    .bpm {
      color: #ddd;
      font-size: 13px;
    }
    #bpm {
      margin: 0 4px;
    }
    #bpm-act {
      font-size: 13px;
    }
    .duration {
      color: #ddd;
      font-size: 13px;
      margin-right: 4px;
    }
    .notes {
      color: #ddd;
      font-size: 13px;
      margin-left: 4px;
    }
    .difficulty {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 5px 0 3px;
    }
    #bpm-change-notice, #bpm-actual-notice {
      font-size: 14px;
      color: #ddd;
      margin: 6px 0 0;
    }
    .flex {
      display: flex;
      align-items: baseline;
    }
  </style>
</head>
<body class="lang-{[{@langcode:str}]}">
<header>
  <div style="flex: 1;"><a href="/genshin-rmm/{[{@langcode:str}]}/" id="headtitle">{[{headtitle:html}]}</a></div>
  <div style="position: relative; width: 24px; height: 24px; display: inline-block;">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#000000" style="width: 100%; height: 100%; display: block;">
      <path fill="none" stroke="#bbb" stroke-width="2" d="M12,23 C18.0751322,23 23,18.0751322 23,12 C23,5.92486775 18.0751322,1 12,1 C5.92486775,1 1,5.92486775 1,12 C1,18.0751322 5.92486775,23 12,23 Z M12,23 C15,23 16,18 16,12 C16,6 15,1 12,1 C9,1 8,6 8,12 C8,18 9,23 12,23 Z M2,16 L22,16 M2,8 L22,8"></path>
    </svg>
    <select id="langselect" style="appearance: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;">
      <option value="ja_jp">日本語</option>
      <option value="en_us">English</option>
      <option value="zh_cn">中文（简体）</option>
      <option value="zh_tw">中文（繁體）</option>
      <option value="ko_kr">한국어</option>
      <option value="es_es">Español</option>
      <option value="fr_fr">Français</option>
      <option value="ru_ru">Русский язык</option>
      <option value="th_th">ภาษาไทย</option>
      <option value="vi_vn">Tiếng Việt</option>
      <option value="de_de">Deutsch</option>
      <option value="id_id">Bahasa Indonesia</option>
      <option value="pt_pt">Português</option>
      <option value="tr_tr">Türkçe</option>
      <option value="it_it">Italiano</option>
    </select>
  </div>
</header>
<main>
  <div class="information">
    <div id="album" data-title="{[{album_description:str}]}">{{{album}}}</div>
    <div id="title">{{{songtitle-with-link}}}</div>
    <div class="table-centering" id="title-multi">{{{songtitle_multilang}}}</div>
    <div class="difficulty">
      <div id="level-{{{difficulty-index}}}">{{{difficulty-text}}}</div>
      <div id="level-count">{{{level-stars}}}</div>
    </div>
    <div class="others">
      <div class="flex"><div class="bpm" data-title="{[{bpm_description:str}]}">BPM</div><div id="bpm" data-title="{[{bpm_description:str}]}">{{{bpm}}}</div><div id="bpm-act" data-title="{{{bpm-changes}}}">{{{bpm-minmax}}}</div></div>
      <div class="flex"><div class="duration">{[{duration:html}]}</div><div id="duration">{{{duration}}}</div></div>
      <div class="flex"><div id="notes"></div><div class="notes">{[{notes:html}]}</div></div>
    </div>
  </div>
  <p id="bpm-actual-notice" {{{bpm-actual-notice-style}}}>{[{bpm-actual-notice:html}]}</p>
  <p id="bpm-change-notice" {{{bpm-change-notice-style}}}>{[{bpm-change-notice:html}]}</p>
  <div id="chart"></div>
</main>
</body>
<!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/sprintf/1.1.3/sprintf.min.js"></script> -->

<script src="https://cdn.jsdelivr.net/npm/i18next-sprintf-postprocessor@0.2.2/i18nextSprintfPostProcessor.min.js"></script> -->
<script src="https://unpkg.com/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
<script src="https://unpkg.com/tippy.js@6.3.7/dist/tippy-bundle.umd.min.js"></script>
<script>
const langText = "{[{@langcode:str}]}";
const params = Object.fromEntries(Array.from(new URLSearchParams(window.location.search).entries()));

const langselect = document.getElementById("langselect");
langselect.value = langText;
langselect.addEventListener("change", event => {
  window.location = "https://md-ndv356.github.io/genshin-rmm/" + event.target.value + "/{{{songid}}}/{{{difficulty-id}}}/";
});

const speed = params.speed ? params.speed - 0 : 200;
const initialBpm = Number("{{{bpm}}}");

// Responsive chart layout constants
const CHART_IDEAL_W = 415;
const CHART_LANE_IDEAL = 70;
const CHART_NOTE_W = 26;
const CHART_FIRST_LANE = 30;
const CHART_RIGHT_PAD = 9;
const CHART_MIN_SPACING = 28; // 26px note + 2px gap minimum

function computeChartLayout() {
  const availableW = Math.min(window.innerWidth, document.documentElement.clientWidth) - 16;
  if (availableW >= CHART_IDEAL_W) {
    return { laneSpacing: CHART_LANE_IDEAL, scale: 1, chartWidth: CHART_IDEAL_W };
  }
  const candidate = Math.floor((availableW - CHART_RIGHT_PAD - CHART_FIRST_LANE - CHART_NOTE_W) / 5);
  const laneSpacing = Math.max(candidate, CHART_MIN_SPACING);
  const chartWidth = CHART_FIRST_LANE + 5 * laneSpacing + CHART_NOTE_W + CHART_RIGHT_PAD;
  const scale = candidate >= CHART_MIN_SPACING ? 1 : availableW / chartWidth;
  return { laneSpacing, scale, chartWidth };
}

const chartLayout = computeChartLayout();
document.getElementById("chart").style.width = chartLayout.chartWidth + "px";
document.documentElement.style.setProperty("--chart-barline-w", (chartLayout.chartWidth - 25) + "px");

function init ([scoreData, measureData, bpmChangesData]){
  const bpmChanges = bpmChangesData ?? {};
  // Analyze Chart
  const tap       = ["1", "2", "3", "4", "5", "6"];
  const holdStart = ["q", "w", "e", "r", "t", "y"];
  const holdEnd   = ["a", "s", "d", "f", "g", "h"];
  let notesCount = 0;
  let notesAA = "";
  const holdStartPos = [null, null, null, null, null, null];
  const notesList = [];
  const barlineList = [];
  const playbackTimeline = [];
  let basePosition = 0;
  let currentTime = 0;
  let currentBpm = Object.prototype.hasOwnProperty.call(bpmChanges, 0) ? bpmChanges[0] : initialBpm;
  const measureCount = scoreData.length;
  for (let barI = 0, barL = measureCount; barI < barL; barI++){
    if (Object.prototype.hasOwnProperty.call(bpmChanges, barI)) currentBpm = bpmChanges[barI];
    const measureLength = measureData?.[barI] ? measureData[barI][0] / measureData[barI][1] : 1;
    const bar = scoreData[barI];
    const lines = bar.split(",");
    barlineList.push({ pos: basePosition, index: barI });
    playbackTimeline.push({ pos: basePosition, time: currentTime, bpm: currentBpm });
    for (let lineI = 0, lineL = lines.length; lineI < lineL; lineI++){
      const line = lines[lineI];
      const notePosition = basePosition + lineI / lineL;
      for (const note of line.split("")){
        const tapIndex = tap.indexOf(note);
        const holdStartIndex = holdStart.indexOf(note);
        const holdEndIndex = holdEnd.indexOf(note);
        if (tapIndex !== -1) notesList.push({type: "tap", pos: notePosition, lane: tapIndex});
        if (holdStartIndex !== -1) holdStartPos[holdStartIndex] = notePosition;
        if (holdEndIndex !== -1){
          const length = notePosition - holdStartPos[holdEndIndex];
          notesList.push({type: "hold", pos: notePosition, length, lane: holdEndIndex});
        }
      }
    }
    basePosition += measureLength;
    currentTime += measureLength * 60000 / currentBpm;
  }
  play.timeline = playbackTimeline;

  // View Notes
  document.getElementById("notes").textContent = notesList.length + "";
  const chartBase = document.getElementById("chart");
  const height = notesList.at(-1).pos * speed;
  const { laneSpacing, scale } = chartLayout;
  chartBase.style.height = (height + 35) + "px";
  if (scale < 1) {
    chartBase.style.transformOrigin = "top center";
    chartBase.style.transform = `scale(${scale})`;
    chartBase.style.marginBottom = Math.round((scale - 1) * (height + 35)) + "px";
  }
  for (let i = 0; i < 6; i++){
    chartBase.insertAdjacentHTML("beforeend", `<div class="laneline" style="left: ${CHART_FIRST_LANE + i * laneSpacing + 14.5}px; height: ${height + 35}px;"></div>`);
  }
  for (const barline of barlineList){
    chartBase.insertAdjacentHTML("beforeend", `<div class="barline${bpmChanges[barline.index] ? " bpmchange" : ""}" style="top: ${height - barline.pos * speed}px; left: 0px;" data-bpm="${bpmChanges[barline.index] ?? ""}">${barline.index + 1}</div>`);
  }
  for (const note of notesList){
    const lanePos = CHART_FIRST_LANE + note.lane * laneSpacing;
    if (note.type === "tap"){
      chartBase.insertAdjacentHTML("beforeend", `
<div class="tap" style="top: ${height - note.pos * speed}px; left: ${lanePos}px;"></div>`);
    } else if (note.type === "hold"){
      const holdStart = height - (note.pos - note.length) * speed;
      const holdEnd = height - note.pos * speed;
      chartBase.insertAdjacentHTML("beforeend", `
<div class="longedge" style="top: ${holdStart}px; left: ${lanePos}px;"></div>
<div class="longmid" style="top: ${holdEnd}px; left: ${lanePos}px; height: ${note.length * speed}px;"></div>
<div class="longedge" style="top: ${holdEnd}px; left: ${lanePos}px;"></div>`);
    }
  }

  // Initialize Tooltip
  for (const element of document.querySelectorAll("[data-title]")){
    tippy(element, {
      content: element.getAttribute("data-title"),
      animation: "fade",
      duration: 300
    });
  }
}

let lastPos = 0;
// for debug purpose
function getChartPositionAtElapsedTime (elapsedTime){
  const timeline = play.timeline;
  if (!timeline?.length) return 0;

  let left = 0;
  let right = timeline.length - 1;
  while (left < right){
    const mid = Math.ceil((left + right) / 2);
    if (timeline[mid].time <= elapsedTime) left = mid;
    else right = mid - 1;
  }

  const segment = timeline[left];
  return segment.pos + Math.max(0, elapsedTime - segment.time) * segment.bpm / 60000;
}


document.body.addEventListener("keydown", event => {
  if (play.pause && event.code === "KeyA" && event.altKey && event.shiftKey){
    startPlay();
    return;
  } else if (!play.pause && event.code === "ShiftRight"){
    play.pause = true;
    return;
  }
});

function startPlay (){
  play.startTime = Date.now();
  play.startPos = document.querySelector("#chart").getBoundingClientRect().bottom + window.scrollY;
  play.pause = false;
  play();
}

function play (){
  const currentTime = Date.now();
  const elapsedTime = currentTime - play.startTime;
  const chartPosition = getChartPositionAtElapsedTime(elapsedTime);
  scrollTo(0, play.startPos - window.innerHeight - chartPosition * speed);
  document.getElementById("headtitle").textContent = (lastPos - (play.startPos - window.innerHeight - chartPosition * speed)).toFixed(2);
  lastPos = play.startPos - window.innerHeight - chartPosition * speed;
  if (!play.pause) requestAnimationFrame(play);
}
play.timeline = [];
play.pause = true;

/**
 * Decodes a Base64-encoded, gzipped string back to its original Unicode string format.
 *
 * @param {string} base64GzippedString The input Base64 string.
 * @returns {Promise<string>} The decompressed Unicode string.
 * @author ChatGPT
 */
async function decodeBase64GzipUnicode(base64GzippedString) {
  // 1. Decode the Base64 string to a Uint8Array
  const binaryString = atob(base64GzippedString);
  const gzippedBytes = Uint8Array.from(binaryString, m => m.charCodeAt(0));

  // 2. Decompress the gzipped bytes using DecompressionStream
  // Convert the Uint8Array to a stream (using a Blob for cross-browser compatibility)
  const stream = new Blob([gzippedBytes]).stream();
  const decompressedStream = stream.pipeThrough(new DecompressionStream("gzip"));

  // 3. Read the stream and decode the bytes to a Unicode string
  // Use a Response object to easily read the stream's array buffer
  const decompressedBuffer = await new Response(decompressedStream).arrayBuffer();
  const originalString = new TextDecoder().decode(decompressedBuffer);

  return originalString;
}

(async () => {
  Promise.all([
    decodeBase64GzipUnicode(`{{{score-gzip-b64}}}`).then(jsonStr => JSON.parse(jsonStr)),
    decodeBase64GzipUnicode(`{{{measure-gzip-b64}}}`).then(jsonStr => JSON.parse(jsonStr)),
    decodeBase64GzipUnicode(`{{{bpm-changes-gzip-b64}}}`).then(jsonStr => JSON.parse(jsonStr)),
  ]).then(init);
})();
</script>
</html>
